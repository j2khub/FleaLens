<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플리렌즈</title>
  <link rel="stylesheet" href="dist/output.css">
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-200">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="px-4 pt-4 pb-3">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <h1 class="text-base font-bold tracking-tight">플리렌즈</h1>
        </div>
        <!-- 테마 토글 -->
        <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-lg p-0.5" id="theme-toggle">
          <button data-theme="light" title="라이트" class="theme-btn p-1.5 rounded-md text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <button data-theme="system" title="시스템" class="theme-btn p-1.5 rounded-md text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </button>
          <button data-theme="dark" title="다크" class="theme-btn p-1.5 rounded-md text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
      <!-- 검색 -->
      <div class="flex gap-2">
        <input type="text" id="search-input"
          class="flex-1 px-3 py-2 text-sm bg-gray-100 dark:bg-gray-800 border border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 rounded-lg outline-none transition-all placeholder:text-gray-400"
          placeholder="상품명을 입력하세요">
        <button id="search-btn"
          class="px-3 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap">
          검색
        </button>
      </div>
      <!-- 추천 키워드 칩 -->
      <div id="keyword-chips" class="flex flex-wrap gap-1.5 mt-2 empty:hidden"></div>
    </div>
  </header>

  <!-- 콘텐츠 -->
  <main class="p-4 space-y-3" id="content">
    <!-- 초기 상태 -->
    <div class="flex flex-col items-center justify-center py-16 text-center">
      <div class="w-12 h-12 rounded-2xl bg-primary/10 dark:bg-primary/20 flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">
        당근마켓, 번개장터, 중고나라<br>
        상품 페이지 방문 시 자동 비교
      </p>
      <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">
        또는 검색창에서 직접 검색
      </p>
    </div>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
