<svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <!-- 플리렌즈 아이콘: 큰 렌즈 + 짧은 손잡이 + ₩ -->

  <!-- 손잡이 (짧게) -->
  <line x1="67" y1="67" x2="82" y2="82" stroke="#fdba74" stroke-width="10" stroke-linecap="round"/>
  <line x1="67" y1="67" x2="82" y2="82" stroke="#ea580c" stroke-width="4" stroke-linecap="round" opacity="0.15"/>

  <!-- 렌즈 배경 -->
  <circle cx="40" cy="40" r="36" fill="#fff7ed"/>

  <!-- 렌즈 테두리 -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="#ea580c" stroke-width="5"/>

  <!-- ₩ 기호 (원 중심 정렬) -->
  <text x="40" y="40" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#ea580c">&#x20A9;</text>
</svg>
